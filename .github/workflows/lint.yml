name: Lint (Ruff)

on:
  push:
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .
